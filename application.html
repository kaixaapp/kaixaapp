<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading-screen">Carregando...</div>

<div id="login-screen" class="hidden">
  <h2>Login</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Senha"><br><br>

  <button onclick="doLogin()">Entrar</button>
  <button onclick="doRegister()">Cadastrar</button>

  <p id="auth-error" style="color:red; display:none;"></p>
</div>
<div id="app-screen" class="hidden">
  <h2>App carregado 🚀</h2>
  <button onclick="logout()">Sair</button>
</div>
<script>
const SUPA_URL = "https://esjwelmmljxczu...supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzandlbG1tbGp4Y3p1Y2JkYXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQzNTQsImV4cCI6MjA4OTk4MDM1NH0.9TckgTMJGe9COJHAVJeh-bIIVgVZ35p2M1Os6I_ytZI";

let sb = null;
let currentUser = null;

// Inicialização segura
if (window.supabase && window.supabase.createClient) {
  sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  window.sb = sb;
} else {
  console.error("Supabase não carregou");
}

// helpers
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// init
window.addEventListener('DOMContentLoaded', async () => {
  hide('loading-screen');
  show('login-screen');

  if (!sb) {
    const err = document.getElementById('auth-error');
    err.textContent = 'Supabase JS não carregou. Verifique internet/CDN.';
    err.style.display = 'block';
    return;
  }

  try {
    const { data: { session } } = await sb.auth.getSession();

    if (session?.user) {
      currentUser = session.user;
      showApp();
    }

    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') {
        hide('app-screen');
        show('login-screen');
      }
    });

  } catch (e) {
    console.error("Erro ao iniciar:", e);
  }
});
  async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const err = document.getElementById('auth-error');

  err.style.display = 'none';

  if (!sb) {
    err.textContent = 'Supabase não carregado';
    err.style.display = 'block';
    return;
  }

  const { error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    return;
  }

  showApp();
}

async function doRegister() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const err = document.getElementById('auth-error');

  err.style.display = 'none';

  if (!sb) {
    err.textContent = 'Supabase não carregado';
    err.style.display = 'block';
    return;
  }

  const { error } = await sb.auth.signUp({
    email,
    password
  });

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    return;
  }

  alert("Cadastro feito! Verifique seu email.");
}

async function logout() {
  if (!sb) return;
  await sb.auth.signOut();
}
function showApp() {
  hide('login-screen');
  show('app-screen');
}
</script>

</body>
</html>
