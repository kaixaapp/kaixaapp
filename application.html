<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 8px;
      width: 250px;
    }

    button {
      margin-right: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #auth-error {
      color: red;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<h1>Login</h1>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button onclick="doLogin()">Entrar</button>
<button onclick="doRegister()">Cadastrar</button>

<p id="auth-error"></p>

<div id="app" class="hidden">
  <h2>Logado com sucesso 🚀</h2>
  <button onclick="logout()">Sair</button>
</div>

<script>
  // 🔴 COLE AQUI SUAS CREDENCIAIS
  const SUPA_URL = "https://esjwelmmljxczucbdawl.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzandlbG1tbGp4Y3p1Y2JkYXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQzNTQsImV4cCI6MjA4OTk4MDM1NH0.9TckgTMJGe9COJHAVJeh-bIIVgVZ35p2M1Os6I_ytZI";

  let sb = null;

  try {
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch (e) {
    console.error("Erro ao criar client:", e);
  }

  function showError(msg) {
    document.getElementById("auth-error").innerText = msg;
  }

  function clearError() {
    document.getElementById("auth-error").innerText = "";
  }

  function showApp() {
    document.getElementById("app").classList.remove("hidden");
  }

  async function doLogin() {
    clearError();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const { error } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showError(error.message);
        return;
      }

      showApp();

    } catch (err) {
      showError("Failed to fetch → URL provavelmente errada");
      console.error(err);
    }
  }

  async function doRegister() {
    clearError();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const { error } = await sb.auth.signUp({
        email,
        password
      });

      if (error) {
        showError(error.message);
        return;
      }

      alert("Cadastro feito! Verifique seu email.");

    } catch (err) {
      showError("Erro de conexão");
      console.error(err);
    }
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }
</script>

</body>
</html>
